- name: Install libnginx-mod-http-geoip2
  ansible.builtin.apt:
    name: libnginx-mod-http-geoip2
    state: present

- name: Add Maxmind PPA
  ansible.builtin.apt_repository:
    repo: 'ppa:maxmind/ppa'
    state: present

- name: Install libmaxminddb
  ansible.builtin.apt:
    name:
      - libmaxminddb0
      - libmaxminddb-dev
      - mmdb-bin
    update_cache: true
    state: present
  tags: packages

- name: Maxmind directory
  ansible.builtin.file:
    path: "{{ nginx_geoip_path }}"
    mode: "0755"
    owner: "www-data"
    state: directory

- name: Add script to update maxmind
  ansible.builtin.template:
    src: update-maxmind.sh.j2
    dest: "{{ nginx_geoip_path }}/update-maxmind.sh"
    mode: "0755"
    owner: www-data
    group: www-data

- name: Update maxmind database
  ansible.builtin.command:
    cmd: "{{ nginx_geoip_path }}/update-maxmind.sh"
  become_user: www-data
  become: true
  environment:
    HOME: /tmp
  changed_when: false
  tags:
    - skip_ansible_lint

- name: apt | ensure cron is installed
  ansible.builtin.apt:
    name: cron
    state: present
  retries: 3
  delay: 10

- name: cron task to update daily
  ansible.builtin.cron:
    name: "maxmind autoupdate"
    minute: "0"
    hour: "3"
    user: "www-data"
    job: "{{ nginx_geoip_path }}/update-maxmind.sh > /tmp/update_maxmind_nginx.log 2>&1"
